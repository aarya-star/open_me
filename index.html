<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss You Dishu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffffff,#ffd6e7,#ffb6d5);
    min-height:100vh;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
}

.wrap{
    max-width:900px;
    margin:auto;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    color:#8b0000;
    margin-bottom:10px;
}

.subtitle{
    color:#444;
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:#b3001b;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin:6px;
}

.viewer{
    width:320px;
    max-width:90%;
    margin:25px auto;
    background:#fff;
    padding:12px;
    border-radius:20px;
    box-shadow:0 12px 25px rgba(0,0,0,.18);
}

.viewer img{
    width:100%;
    height:430px;
    object-fit:cover;
    border-radius:14px;
    display:none;
}

.card{
    background:rgba(255,255,255,.55);
    padding:25px;
    border-radius:20px;
    max-width:760px;
    margin:30px auto;
}

.question{
    text-align:left;
    margin:22px 0;
}

.question h3{
    margin-bottom:10px;
    color:#000;
}

.option{
    display:block;
    width:100%;
    text-align:left;
    background:#fff;
    color:#000;
}

.correct{
    background:#2ecc71 !important;
    color:#fff !important;
}

.wrong{
    background:#e74c3c !important;
    color:#fff !important;
}

@media(max-width:600px){
    h1{font-size:3rem;}
    .viewer img{height:360px;}
}
</style>
</head>

<body>
<div class="wrap">

<h1>I Miss You, Dishu ❤️</h1>
<p class="subtitle">Tap My Favorites 💕</p>

<audio id="bgmusic" loop>
<source src="/open_me/Atak Gaya.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎵 Play Music</button>
<button onclick="showPhotos()">💕 My Favorites</button>

<div class="viewer">
<img id="photo" src="/open_me/photo-1.jpeg" alt="memory">
</div>

<div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<div class="card">
<h2>Questionnaire 💌</h2>

<div class="question">
<h3>1. Kaun bada bachha hai?</h3>
<button class="option" onclick="checkAnswer(this,true)">Me (jhaluuuu)</button>
<button class="option" onclick="checkAnswer(this,false)">Tum (Dishuuu)</button>
</div>

<div class="question">
<h3>2. Who irritates me more?</h3>
<button class="option" onclick="checkAnswer(this,true)">Teri kami</button>
<button class="option" onclick="checkAnswer(this,false)">Teri harkate</button>
</div>

<div class="question">
<h3>3. My favorite snack?</h3>
<button class="option" onclick="checkAnswer(this,true)">Tumhara bicep</button>
<button class="option" onclick="checkAnswer(this,false)">Bhakarwadi</button>
</div>

<div class="question">
<h3>4. Kya tumko yaad aati?</h3>
<button class="option" onclick="checkAnswer(this,true)">Haan aati</button>
<button class="option" onclick="checkAnswer(this,false)">Dusra option</button>
</div>

</div>
</div>

<script>
const photos = [
"/open_me/photo-1.jpeg",
"/open_me/photo-2.jpeg",
"/open_me/photo-3.jpeg",
"/open_me/photo-4.jpeg",
"/open_me/photo-5.jpeg",
"/open_me/photo-6.jpeg"
];

let i = 0;
const img = document.getElementById("photo");

function showPhotos(){
    img.style.display = "block";
    img.src = photos[i];
}

function next(){
    img.style.display = "block";
    i = (i + 1) % photos.length;
    img.src = photos[i];
}

function prev(){
    img.style.display = "block";
    i = (i - 1 + photos.length) % photos.length;
    img.src = photos[i];
}

function playMusic(){
    document.getElementById("bgmusic").play();
}

function checkAnswer(btn,isCorrect){
    const parent = btn.parentElement;
    const all = parent.querySelectorAll(".option");

    all.forEach(x => x.disabled = true);

    if(isCorrect){
        btn.classList.add("correct");
    }else{
        btn.classList.add("wrong");
        all.forEach(x=>{
            if(x.getAttribute("onclick").includes("true")){
                x.classList.add("correct");
            }
        });
    }
}
</script>

</body>
</html>
