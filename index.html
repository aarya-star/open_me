<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss You Dishu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffffff,#ffd6e7,#ffb6d5);
    min-height:100vh;
    text-align:center;
    overflow-x:hidden;
    position:relative;
    padding:20px;
}

/* Sparkles */
.sparkle{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 10px #ff4fa3,0 0 20px white;
    animation:floatUp linear infinite;
    z-index:0;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(.4);
        opacity:0;
    }
    20%{opacity:1;}
    to{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

.wrap{
    max-width:900px;
    margin:auto;
    position:relative;
    z-index:2;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:4rem;
    color:#8b0000;
    margin-bottom:15px;
}

.subtitle{
    color:#444;
    margin-bottom:20px;
}

/* Buttons */
button{
    padding:12px 20px;
    border:none;
    border-radius:30px;
    background:#b3001b;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin:6px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

/* Photo Book */
.book{
    width:320px;
    height:430px;
    margin:30px auto;
    perspective:1400px;
}

.inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:1.2s;
}

.book.open .inner{
    transform:rotateY(-165deg);
}

.cover,.page{
    position:absolute;
    inset:0;
    border-radius:20px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    box-shadow:0 15px 30px rgba(0,0,0,.25);
}

.cover{
    background:linear-gradient(135deg,#ff4f88,#ffc1dc);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:2rem;
    font-weight:bold;
}

.page{
    background:white;
    padding:10px;
    transform:rotateY(0deg) translateZ(2px);
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:14px;
    display:block;
}

/* Card */
.card{
    background:rgba(255,255,255,.45);
    padding:25px;
    border-radius:20px;
    max-width:760px;
    margin:30px auto;
}

.card h2{
    margin-bottom:20px;
    color:#8b0000;
}

.question{
    text-align:left;
    margin:25px 0;
}

.question h3{
    margin-bottom:10px;
    color:black;
}

.option{
    display:block;
    width:100%;
    text-align:left;
    background:white;
    color:black;
}

.correct{
    background:#2ecc71 !important;
    color:white !important;
}

.wrong{
    background:#e74c3c !important;
    color:white !important;
}

@media(max-width:600px){
    h1{font-size:3rem;}
    .book{
        width:280px;
        height:380px;
    }
}
</style>
</head>

<body>

<div class="wrap">

<h1>I Miss You, Dishu ❤️</h1>
<p class="subtitle">Open the photo book and answer for me...</p>

<!-- Music -->
<audio id="bgmusic" loop>
<source src="./Atak Gaya.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="manualPlay()">🎵 Play Music</button>

<!-- Book -->
<div class="book" id="book">
<div class="inner">

<div class="cover">My Favorites 💕</div>

<div class="page">
<img id="photo" src="./photo-1.jpeg" alt="photo">
</div>

</div>
</div>

<div>
<button onclick="toggleBook()">Open / Close</button>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>

<!-- Questionnaire -->
<div class="card">
<h2>Questionnaire 💌</h2>

<div class="question">
<h3>1. Kaun bada bachha hai?</h3>
<button class="option" onclick="checkAnswer(this,true)">Me (jhaluuuu)</button>
<button class="option" onclick="checkAnswer(this,false)">Tum (Dishuuu)</button>
</div>

<div class="question">
<h3>2. Who irritates me more?</h3>
<button class="option" onclick="checkAnswer(this,true)">Teri kami</button>
<button class="option" onclick="checkAnswer(this,false)">Teri harkate</button>
</div>

<div class="question">
<h3>3. My favorite snack?</h3>
<button class="option" onclick="checkAnswer(this,true)">Tumhara bicep</button>
<button class="option" onclick="checkAnswer(this,false)">Bhakarwadi</button>
</div>

<div class="question">
<h3>4. Kya tumko yaad aati?</h3>
<button class="option" onclick="checkAnswer(this,true)">Haan aati</button>
<button class="option" onclick="checkAnswer(this,false)">Dusra option</button>
</div>

</div>

</div>

<script>
const photos = [
'./photo-1.jpeg',
'./photo-2.jpeg',
'./photo-3.jpeg',
'./photo-4.jpeg',
'./photo-5.jpeg',
'./photo-6.jpeg'
];

let i = 0;
const img = document.getElementById("photo");
const music = document.getElementById("bgmusic");
let sparkleStarted = false;

function next(){
    i = (i + 1) % photos.length;
    img.src = photos[i];
}

function prev(){
    i = (i - 1 + photos.length) % photos.length;
    img.src = photos[i];
}

function toggleBook(){
    document.getElementById("book").classList.toggle("open");
}

function checkAnswer(btn,isCorrect){
    let parent = btn.parentElement;
    let options = parent.querySelectorAll(".option");

    options.forEach(o => o.disabled = true);

    if(isCorrect){
        btn.classList.add("correct");
    }else{
        btn.classList.add("wrong");
        options.forEach(o=>{
            if(o.getAttribute("onclick").includes("true")){
                o.classList.add("correct");
            }
        });
    }
}

function startSparkles(){
    if(sparkleStarted) return;
    sparkleStarted = true;

    setInterval(()=>{
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*100 + "vw";
        s.style.animationDuration = (3 + Math.random()*4) + "s";
        s.style.width = s.style.height = (4 + Math.random()*8) + "px";
        document.body.appendChild(s);

        setTimeout(()=>s.remove(),7000);
    },200);
}

function manualPlay(){
    music.play();
    startSparkles();
    document.getElementById("musicBtn").style.display = "none";
}
</script>

</body>
</html>
